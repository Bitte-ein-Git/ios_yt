name: "🌀• Auto-Build Fordy's YT+🗿"

on:
  schedule:
    - cron: '0 12 * * *' # Runs daily at 12:00 PM (noon) UTC
  workflow_dispatch:     # Allows manual triggering

permissions:
  contents: write        # Important: Allows pushing tag.txt and creating releases

jobs:
  check-and-build:
    name: Check Updates & Build IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check for new release
        id: check_release
        run: |
          # Fetch the latest release tag from diarrhea3/YTLiteDiarrhea
          LATEST_RELEASE=$(curl -s "https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/latest")
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r .tag_name)
          
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "::error::Could not fetch the latest tag."
            exit 1
          fi

          # Read local tag if tag.txt exists
          if [ -f "tag.txt" ]; then
            CURRENT_TAG=$(cat tag.txt)
          else
            CURRENT_TAG=""
          fi

          # Compare versions
          if [ "$LATEST_TAG" == "$CURRENT_TAG" ]; then
            echo "No new version found (Current: $LATEST_TAG). Skipping build."
            echo "run_build=false" >> $GITHUB_OUTPUT
          else
            echo "New version found! ($CURRENT_TAG -> $LATEST_TAG)"
            echo "run_build=true" >> $GITHUB_OUTPUT
            echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV
          fi

      - name: Download IPA and Extract Version
        if: steps.check_release.outputs.run_build == 'true'
        run: |
          # Fetch all assets of the latest release
          ASSETS=$(curl -s "https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/tags/${{ env.LATEST_TAG }}")
          
          # Find the first file ending with .ipa
          IPA_URL=$(echo "$ASSETS" | jq -r '.assets[] | select(.name | endswith(".ipa")) | .browser_download_url' | head -n 1)
          IPA_NAME=$(echo "$ASSETS" | jq -r '.assets[] | select(.name | endswith(".ipa")) | .name' | head -n 1)

          if [ -z "$IPA_URL" ] || [ "$IPA_URL" == "null" ]; then
            echo "::error::No .ipa file found in release ${{ env.LATEST_TAG }}."
            exit 1
          fi

          echo "Downloading $IPA_NAME..."
          curl -L -o src.ipa "$IPA_URL"

          # Extract the version from the filename (e.g., 21.08.3_YouTubePlus_5.2b4.ipa -> 21.08.3)
          # Cuts the string at the first underscore (_)
          EXTRACTED_VERSION=$(echo "$IPA_NAME" | cut -d'_' -f1)
          
          echo "Extracted Version: $EXTRACTED_VERSION"
          echo "EXTRACTED_VERSION=$EXTRACTED_VERSION" >> $GITHUB_ENV

      - name: Download custom icon
        if: steps.check_release.outputs.run_build == 'true'
        run: |
          icon_url="https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/custom/icon.png"
          wget "$icon_url" --no-verbose -O ${{ github.workspace }}/icon.png

      - name: Install Cyan and dependencies
        if: steps.check_release.outputs.run_build == 'true'
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          pipx inject cyan Pillow

      - name: Inject Custom Name and Icon via Cyan
        if: steps.check_release.outputs.run_build == 'true'
        run: |
          # Apply custom icon, custom name, and the extracted app version
          cyan -i src.ipa -o FordyYT_${{ env.EXTRACTED_VERSION }}.ipa -v "${{ env.EXTRACTED_VERSION }}" -k icon.png -n "YouTube+🗿"
          
      - name: Update tag.txt
        if: steps.check_release.outputs.run_build == 'true'
        run: |
          # Save the new tag to the file
          echo "${{ env.LATEST_TAG }}" > tag.txt
          
          # Configure Git user for the automated commit
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Add changes and commit
          git add tag.txt
          git commit -m "chore: Update YTLiteDiarrhea tracking tag to ${{ env.LATEST_TAG }}"
          git push

      - name: Create Release
        if: steps.check_release.outputs.run_build == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.EXTRACTED_VERSION }}"
          name: "YouTube+🗿 v${{ env.EXTRACTED_VERSION }}"
          files: |
            FordyYT_${{ env.EXTRACTED_VERSION }}.ipa
          body: |
            
            - **Upstream Tag:** ${{ env.LATEST_TAG }}
            - **YouTube Version:** ${{ env.EXTRACTED_VERSION }}
