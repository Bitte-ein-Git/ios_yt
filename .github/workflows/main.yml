name: Create Fordy's YouTube+🗿 App
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'App Version (Example: 19.05.2-1)'
        required: true

env:
  APP_NAME: "YouTube+🗿"
  BUNDLE_ID: "com.google.ios.youtube"
  ICON_PATH: "custom/icon.png"
  IPA_NAME: "FordysYT"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build YouTube+
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v4.1.1
        with:
          path: main
          submodules: recursive

      - name: Download Base IPA from private release
        id: download_base_ipa
        run: |
          ASSET_URL=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/src" | \
            jq -r '.assets[] | select(.name == "src.ipa") | .browser_download_url')
          
          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" == "null" ]; then
            echo "::error::Could not find src.ipa in release with tag 'src'. Please create a private draft release with this tag and upload the source IPA."
            exit 1
          fi
          
          echo "Downloading from $ASSET_URL"
          curl -L -o ${{ github.workspace }}/youtube.ipa "$ASSET_URL"
          
          file_type=$(file --mime-type -b ${{ github.workspace }}/youtube.ipa)
          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install Dependencies
        run: brew install make ldid

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        id: theos
        uses: actions/cache@v4
        env:
          cache-name: theos_cache_67db2ab
        with:
          path: theos/
          key: ${{ env.cache-name }}

      - name: Setup Theos
        if: steps.theos.outputs.cache-hit != 'true'
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          ref: 67db2ab8d950910161730de77c322658ea3e6b44
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Download iOS SDK
        if: steps.theos.outputs.cache-hit != 'true'
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Download Tweaks
        run: |
          # YTLitePlus
          LATEST_YTLITE_URL=$(curl -s "https://api.github.com/repos/dayanch96/YTLite/releases/latest" | jq -r '.assets[] | select(.name | contains("YTLitePlus")) | .browser_download_url')
          wget "$LATEST_YTLITE_URL" --no-verbose -O ${{ github.workspace }}/ytliteplus.deb
          # Safari Extension
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/CokePokes/YoutubeExtensions/
          cd YoutubeExtensions
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Inject tweaks into IPA
        run: |
          cyan -i youtube.ipa \
               -o ${{ env.IPA_NAME }}_${{ inputs.version }}.ipa \
               -c ${{ env.ICON_PATH }} \
               -f ytliteplus.deb OpenYoutubeSafariExtension.appex \
               -n "${{ env.APP_NAME }}" \
               -b ${{ env.BUNDLE_ID }} \
               -v ${{ inputs.version }} \
               -uwe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: "${{ env.APP_NAME }} v${{ inputs.version }}"
          files: "${{ env.IPA_NAME }}_${{ inputs.version }}.ipa"
          draft: false
          prerelease: false

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases/tag/${{ inputs.version }}"
