name: "🌀• Auto-Build Fordy's YT+🗿 [DEV]"

# Manual trigger
on:
  workflow_dispatch:

# Grant write permissions
permissions:
  contents: write

# Define build job
jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: Bitte-ein-Git/action_clear-runs@main

  check-and-build:
    name: Check Updates & Build IPA
    runs-on: macos-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # Fetch upstream release
      - name: Fetch latest release
        run: |
          LATEST_RELEASE=$(curl -s "https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/latest")
          LATEST_TAG=$(echo "$LATEST_RELEASE" | jq -r .tag_name)
          
          if [ "$LATEST_TAG" == "null" ] || [ -z "$LATEST_TAG" ]; then
            echo "::error::Could not fetch the latest tag."
            exit 1
          fi

          echo "LATEST_TAG=$LATEST_TAG" >> $GITHUB_ENV

      # Download and extract IPA
      - name: Download IPA and Extract Version
        run: |
          ASSETS=$(curl -s "https://api.github.com/repos/diarrhea3/YTLiteDiarrhea/releases/tags/${{ env.LATEST_TAG }}")
          
          IPA_URL=$(echo "$ASSETS" | jq -r '.assets[] | select(.name | endswith(".ipa")) | .browser_download_url' | head -n 1)
          IPA_NAME=$(echo "$ASSETS" | jq -r '.assets[] | select(.name | endswith(".ipa")) | .name' | head -n 1)

          if [ -z "$IPA_URL" ] || [ "$IPA_URL" == "null" ]; then
            echo "::error::No .ipa file found in release ${{ env.LATEST_TAG }}."
            exit 1
          fi

          curl -L -o src.ipa "$IPA_URL"

          EXTRACTED_VERSION=$(echo "$IPA_NAME" | cut -d'_' -f1)
          echo "EXTRACTED_VERSION=$EXTRACTED_VERSION" >> $GITHUB_ENV

      # Download custom icon
      - name: Download custom icon
        run: |
          icon_url="https://raw.githubusercontent.com/${{ github.repository }}/refs/heads/main/custom/icon.png"
          wget "$icon_url" --no-verbose -O ${{ github.workspace }}/icon.png

      # Install dependencies
      - name: Install Cyan and dependencies
        run: |
          pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip
          pipx inject cyan Pillow

      # Setup Theos
      - name: Setup Theos
        uses: actions/checkout@v4
        with:
          repository: theos/theos
          path: theos
          submodules: recursive

     # Install ldid and packaging tools
      - name: Install build tools
        run: |
          brew install ldid xz

      # Build CastFix tweak
      - name: Build CastFix Tweak
        run: |
          mkdir -p build_castfix
          cp CastFix/CastFix.x build_castfix/
          
          cat << 'EOF' > build_castfix/Makefile
          ARCHS = arm64
          TARGET := iphone:clang:latest:13.0
          include $(THEOS)/makefiles/common.mk
          TWEAK_NAME = CastFix
          CastFix_FILES = CastFix.x
          CastFix_CFLAGS = -fobjc-arc
          include $(THEOS_MAKE_PATH)/tweak.mk
          EOF
          
          cat << 'EOF' > build_castfix/CastFix.plist
          { Filter = { Bundles = ( "com.google.ios.youtube" ); }; }
          EOF
          
          cd build_castfix
          export THEOS=${{ github.workspace }}/theos
          make package FINALPACKAGE=1
          
          DEB_FILE=$(ls packages/*.deb | head -n 1)
          echo "DEB_FILE=${{ github.workspace }}/build_castfix/${DEB_FILE}" >> $GITHUB_ENV

      # Inject modifications
      - name: Inject Custom Name, Icon, and Tweak via Cyan
        run: |
          cyan -i src.ipa -o FordyYT_${{ env.EXTRACTED_VERSION }}-dev.ipa -v "${{ env.EXTRACTED_VERSION }}-dev" -k icon.png -n "YouTube+🗿" -f ${{ env.DEB_FILE }}

      # Publish dev release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.EXTRACTED_VERSION }}-dev"
          name: "YouTube+🗿 [DEV] v${{ env.EXTRACTED_VERSION }}-dev"
          prerelease: true
          files: |
            FordyYT_${{ env.EXTRACTED_VERSION }}-dev.ipa
          body: |
            
            - **Upstream Tag:** ${{ env.LATEST_TAG }}
            - **YouTube Version:** ${{ env.EXTRACTED_VERSION }}-dev